name: YouTube Keyword Research

on:
  schedule:
    - cron: '0 14 * * 1,3,5'  # 7am PDT Mon/Wed/Fri
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run YouTube keyword research
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/youtube-keywords.js

      - name: Commit keyword data
        run: |
          git config user.email "pablo@brandedstrong.com"
          git config user.name "brandedstrong"
          git add keywords/
          git diff --staged --quiet || git commit -m "keywords: $(date +%Y-%m-%d)"
          git push
